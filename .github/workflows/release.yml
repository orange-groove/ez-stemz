name: Release

# Tag-driven release. Push a tag like `v0.3.0` and this workflow will build,
# sign, notarize and attach the DMG to a new GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for manual runs (e.g. v0.0.0-test)'
        required: false
        default: 'v0.0.0-dev'

jobs:
  macos-release:
    name: macOS universal DMG
    runs-on: macos-14
    timeout-minutes: 60

    env:
      DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      APPLE_ID:                 ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID:            ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD:       ${{ secrets.APPLE_APP_PASSWORD }}
      # Where the demucs.cpp source tree should live (CMake expects it as a sibling).
      DEMUCS_DIR: ${{ github.workspace }}/demucs.cpp

    steps:
      - name: Check out ezstemz
        uses: actions/checkout@v4
        with:
          path: ezstemz

      - name: Check out demucs.cpp (with submodules)
        uses: actions/checkout@v4
        with:
          repository: sevagh/demucs.cpp
          submodules: recursive
          path: demucs.cpp

      - name: Install build tools
        run: |
          brew install ninja create-dmg ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Download demucs model
        env:
          MODEL_URL: ${{ secrets.EZSTEMZ_MODEL_URL }}
        run: |
          if [[ -z "${MODEL_URL}" ]]; then
            echo "::error::Set the EZSTEMZ_MODEL_URL secret to a direct download for ggml-model-htdemucs-6s-f16.bin"
            exit 1
          fi
          mkdir -p models
          curl -L --fail --retry 3 -o models/ggml-model-htdemucs-6s-f16.bin "${MODEL_URL}"
          ls -la models/

      - name: Import signing certificate
        env:
          P12_BASE64:   ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Build + sign + notarize + DMG
        working-directory: ezstemz
        env:
          EZSTEMZ_VERSION:    ${{ steps.version.outputs.version }}
          EZSTEMZ_MODEL_FILE: ${{ github.workspace }}/models/ggml-model-htdemucs-6s-f16.bin
        run: |
          # CMake's default expects ../demucs.cpp; we cloned to $DEMUCS_DIR.
          export EZSTEMZ_EXTRA_CMAKE_ARGS="-DEZSTEMZ_DEMUCS_DIR=${DEMUCS_DIR}"
          # The release script doesn't read that env, so pass via explicit arg.
          # Easiest: invoke cmake configure ourselves first so the script's
          # subsequent reconfigure picks up the cached value.
          cmake -B build-release -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
              -DEZSTEMZ_DEMUCS_DIR="${DEMUCS_DIR}" \
              -DEZSTEMZ_MODEL_FILE="${EZSTEMZ_MODEL_FILE}"

          ./scripts/release

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZStemz-${{ steps.version.outputs.version }}-macos
          path: ezstemz/dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ezstemz/dist/*.dmg
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows-release:
    name: Windows installer
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      DEMUCS_DIR:    ${{ github.workspace }}\demucs.cpp
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - name: Check out ezstemz
        uses: actions/checkout@v4
        with:
          path: ezstemz

      - name: Check out demucs.cpp (with submodules)
        uses: actions/checkout@v4
        with:
          repository: sevagh/demucs.cpp
          submodules: recursive
          path: demucs.cpp

      - name: Set up MSVC + clang-cl
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja + NSIS
        run: |
          choco install ninja nsis -y --no-progress

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\downloads
          key: vcpkg-${{ runner.os }}-openblas-static-v1

      - name: Install OpenBLAS via vcpkg
        shell: pwsh
        run: |
          # vcpkg is preinstalled at C:\vcpkg on windows-latest runners.
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install openblas:x64-windows-static

      - name: Download demucs model
        shell: pwsh
        env:
          MODEL_URL: ${{ secrets.EZSTEMZ_MODEL_URL }}
        run: |
          if (-not $env:MODEL_URL) {
            Write-Error "Set the EZSTEMZ_MODEL_URL secret to a direct download for ggml-model-htdemucs-6s-f16.bin"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path models | Out-Null
          Invoke-WebRequest -Uri $env:MODEL_URL `
                            -OutFile models\ggml-model-htdemucs-6s-f16.bin `
                            -MaximumRetryCount 3
          Get-ChildItem models

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $v = $env:GITHUB_REF.Substring("refs/tags/v".Length)
          } else {
            $v = "${{ github.event.inputs.version }}".TrimStart("v")
            if (-not $v) { $v = "0.0.0-dev" }
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v"

      - name: Configure
        working-directory: ezstemz
        shell: pwsh
        env:
          MODEL_FILE: ${{ github.workspace }}\models\ggml-model-htdemucs-6s-f16.bin
        run: |
          $toolchain = "$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake -B build-release -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DEZSTEMZ_DEMUCS_DIR="$env:DEMUCS_DIR" `
            -DEZSTEMZ_MODEL_FILE="$env:MODEL_FILE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build
        working-directory: ezstemz
        shell: pwsh
        run: |
          cmake --build build-release --target ezstemz
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem build-release\ezstemz_artefacts\Release

      - name: Build NSIS installer
        working-directory: ezstemz
        shell: pwsh
        env:
          EZSTEMZ_VERSION: ${{ steps.version.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $buildDir = "$PWD\build-release\ezstemz_artefacts\Release"
          $output   = "$PWD\dist\EZStemz-$env:EZSTEMZ_VERSION-Setup.exe"
          & makensis `
            "/DEZSTEMZ_VERSION=$env:EZSTEMZ_VERSION" `
            "/DEZSTEMZ_BUILD_DIR=$buildDir" `
            "/DEZSTEMZ_OUTPUT=$output" `
            windows\installer.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZStemz-${{ steps.version.outputs.version }}-windows
          path: ezstemz/dist/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ezstemz/dist/*.exe
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
